name: Auto Release Install ZIP

on:
  push:
    branches:
      - main
  # 手动触发入口，方便只创建一次安装包发布，不必额外 push。
  workflow_dispatch:

# 创建 GitHub Release 并上传安装包需要写权限。
permissions:
  contents: write

jobs:
  build-package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Blender install ZIP and release
        run: |
          set -euo pipefail

          # 同一个时间戳同时用于 tag、release 标题和 zip 文件名，避免互相对不上。
          VERSION="$(date +'%Y%m%d-%H%M%S')"
          RELEASE_TAG="v${VERSION}"
          RELEASE_TITLE="HoTools-${VERSION}"
          ZIP_45="_dist/HoTools-${VERSION}-Blender-4.5-py311.zip"
          ZIP_52="_dist/HoTools-${VERSION}-Blender-5.2-py313.zip"

          # 每个安装包只携带目标 Blender 使用的 Python ABI 依赖，避免把两套大型
          # Pillow/OIDN/native runtime 一起塞进同一个 ZIP。
          python tools/build_release_zip.py --abi py311 --output "$ZIP_45"
          python tools/build_release_zip.py --abi py313 --output "$ZIP_52"

          # GitHub 页面仍会自动显示源码压缩包；用户应下载这里上传的对应 Blender 版本 ZIP。
          gh release create "$RELEASE_TAG" "$ZIP_45" "$ZIP_52" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

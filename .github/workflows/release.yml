name: Auto Release Clean ZIP

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up zip tool
      run: sudo apt-get install zip -y rsync -y


    - name: Prepare clean folder and create ZIP
      run: |
        # 固定压缩包内文件夹名
        FOLDER_NAME="HoTools"
        WORK_DIR="$(mktemp -d)"
        PACKAGE_DIR="$WORK_DIR/$FOLDER_NAME"
        mkdir -p "$PACKAGE_DIR"

        # 复制文件到文件夹，排除 .git .venv .github .vscode .gitignore __pycache__ *.blend[0-9]
        # 不能使用*.blend*替代，因为这里的*可以为空，导致.blend文件也被排除掉了
        rsync -av --exclude=".git" --exclude=".github" --exclude=".vscode" --exclude=".venv" --exclude=".gitignore" --exclude="__pycache__" --exclude="*.blend[0-9]" ./ "$PACKAGE_DIR/"
        # 压缩包名字用日期
        ZIP_NAME="HoTools-$(date +'%Y%m%d-%H%M%S').zip"
        (
          cd "$WORK_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$FOLDER_NAME"
        )
        rm -rf "$WORK_DIR"

        # 创建 Release 并上传 ZIP
        gh release create "v$(date +'%Y%m%d-%H%M%S')" $ZIP_NAME --title "$ZIP_NAME"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
